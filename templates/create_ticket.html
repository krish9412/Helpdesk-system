<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h3>Create Helpdesk Ticket</h3>

        <form method="POST">

            <!-- TITLE -->
            <div class="mb-3">
                <label>Ticket Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter ticket title" required>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" placeholder="Describe the issue" required></textarea>
            </div>

            <!-- CATEGORY -->
            <div class="mb-3">
                <label>Category</label>
                <select name="category" class="form-control" required>
                    <option>Hardware</option>
                    <option>Software</option>
                    <option>Network</option>
                    <option>Microsoft 365</option>
                    <option>Password Reset</option>
                    <option>Printer</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- PRIORITY -->
            <div class="mb-3">
                <label>Priority</label>
                <select name="priority" class="form-control">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                    <option>Critical</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Submit Ticket</button>
            <a href="/dashboard" class="btn btn-secondary">← Back to Dashboard</a>

        </form>

    </div>

</div>

</body>
</html>
